<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>BAI Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Title bar -->
  <div class="titlebar">
    <span class="titlebar-text">BAI Desktop</span>
    <button class="btn-settings" id="btn-settings" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Server info -->
  <div class="server-info">
    <div class="server-url" id="server-url">http://127.0.0.1:3939</div>
    <div class="server-right">
      <div class="connection-status" id="connection-status">
        <span class="dot dot-gray" id="conn-dot"></span>
        <span id="conn-text" data-i18n="disconnected">Disconnected</span>
      </div>
    </div>
  </div>

  <!-- ══ Main View (default) ══ -->
  <div id="view-main" class="view">
    <!-- Master switch -->
    <div class="master-bar">
      <div class="master-left">
        <span class="master-icon">⏻</span>
        <span class="master-label" data-i18n="master_switch">Master Switch</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="master-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Services -->
    <div class="section-header" data-i18n="services">Services</div>
    <div id="services-list" class="services-list"></div>

    <!-- Logs -->
    <div class="section-header">
      <span data-i18n="logs">Logs</span>
      <button class="btn-clear" id="btn-clear" data-i18n="clear">Clear</button>
    </div>
    <div id="log-area" class="log-area">
      <div class="log-empty">Waiting for activity...</div>
    </div>
  </div>

  <!-- ══ Settings View (hidden) ══ -->
  <div id="view-settings" class="view" style="display:none">
    <div class="section-header" data-i18n="settings">Settings</div>
    <div class="settings-panel">
      <div class="setting-row">
        <label class="setting-label" data-i18n="browser">Browser</label>
        <select id="setting-browser" class="setting-select">
          <option value="chrome">Chrome</option>
          <option value="edge">Edge</option>
        </select>
      </div>
      <div class="setting-row">
        <label class="setting-label" data-i18n="language">Language</label>
        <select id="setting-language" class="setting-select">
          <option value="auto">🌐 Auto</option>
          <option value="zh-CN">简体中文</option>
          <option value="en-US">English</option>
        </select>
      </div>
      <div class="install-row">
        <button class="btn-install" id="btn-install">
          <span class="btn-install-icon">🧩</span>
          <span data-i18n="install_ext">Install Extension</span>
        </button>
        <button class="btn-install btn-install-userscript" id="btn-install-userscript">
          <span class="btn-install-icon">📜</span>
          <span data-i18n="install_script">Install Userscript</span>
        </button>
      </div>
      <div class="install-hint" id="install-hint"></div>
      <button class="btn-quit" id="btn-quit" data-i18n="quit">Quit BAI Desktop</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
