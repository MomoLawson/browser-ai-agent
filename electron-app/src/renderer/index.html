<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>BAI Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Title bar drag region (macOS hidden title bar) -->
  <div class="titlebar">
    <span class="titlebar-text">BAI Desktop</span>
  </div>

  <!-- Server info -->
  <div class="server-info">
    <div class="server-url" id="server-url">http://127.0.0.1:3939</div>
    <div class="server-status" id="server-status">
      <span class="dot dot-green"></span>
      <span>Running</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="section-header" data-i18n="settings">Settings</div>
  <div class="settings-panel">
    <div class="setting-row">
      <label class="setting-label" data-i18n="browser">Browser</label>
      <select id="setting-browser" class="setting-select">
        <option value="chrome">Chrome</option>
        <option value="edge">Edge</option>
      </select>
    </div>
    <div class="setting-row">
      <label class="setting-label" data-i18n="language">Language</label>
      <select id="setting-language" class="setting-select">
        <option value="auto">🌐 Auto</option>
        <option value="zh-CN">简体中文</option>
        <option value="en-US">English</option>
      </select>
    </div>
  </div>

  <!-- Services -->
  <div class="section-header" data-i18n="services">Services</div>
  <div id="services-list" class="services-list">
    <!-- Populated by JS -->
  </div>

  <!-- Logs -->
  <div class="section-header">
    <span data-i18n="logs">Logs</span>
    <button class="btn-clear" id="btn-clear" data-i18n="clear">Clear</button>
  </div>
  <div id="log-area" class="log-area">
    <div class="log-empty">Waiting for activity...</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
